<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- dark board background -->
  <rect width="32" height="32" rx="5" fill="#111827"/>

  <!-- 9 cells: 3 cols × 3 rows, each 8×8 with 1px gap, 2px padding -->
  <!-- row 0 -->
  <rect x="2"  y="2"  width="8" height="8" rx="1.5" fill="#f8fafc"/>
  <rect x="12" y="2"  width="8" height="8" rx="1.5" fill="#f8fafc"/>
  <rect x="22" y="2"  width="8" height="8" rx="1.5" fill="#f8fafc"/>
  <!-- row 1 -->
  <rect x="2"  y="12" width="8" height="8" rx="1.5" fill="#f8fafc"/>
  <rect x="12" y="12" width="8" height="8" rx="1.5" fill="#f8fafc"/>
  <rect x="22" y="12" width="8" height="8" rx="1.5" fill="#f8fafc"/>
  <!-- row 2 -->
  <rect x="2"  y="22" width="8" height="8" rx="1.5" fill="#f8fafc"/>
  <rect x="12" y="22" width="8" height="8" rx="1.5" fill="#f8fafc"/>
  <rect x="22" y="22" width="8" height="8" rx="1.5" fill="#f8fafc"/>

  <!-- marks: X/O/X / _/X/O / O/_/X -->
  <!-- cell(0,0) X -->
  <text x="6"  y="9.5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="8" fill="#2563eb">X</text>
  <!-- cell(1,0) O -->
  <text x="16" y="9.5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="8" fill="#ea580c">O</text>
  <!-- cell(2,0) X -->
  <text x="26" y="9.5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="8" fill="#2563eb">X</text>

  <!-- cell(0,1) empty -->
  <!-- cell(1,1) X -->
  <text x="16" y="19.5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="8" fill="#2563eb">X</text>
  <!-- cell(2,1) O -->
  <text x="26" y="19.5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="8" fill="#ea580c">O</text>

  <!-- cell(0,2) O -->
  <text x="6"  y="29.5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="8" fill="#ea580c">O</text>
  <!-- cell(1,2) empty -->
  <!-- cell(2,2) X -->
  <text x="26" y="29.5" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="8" fill="#2563eb">X</text>
</svg>
