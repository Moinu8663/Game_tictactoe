<main class="home-shell">
  <section class="hero-panel">
    <div class="hero-copy">
      <p class="eyebrow">Tic Tac Toe Arena</p>
      <h1>Play Your Next Move</h1>
      <p class="summary">
        Choose a quick match, challenge a friend online, or play together on one screen.
      </p>
      <div class="hero-actions">
        <a class="start-button" routerLink="/game-dashboard">Start Game</a>
        <a class="download-button" href="https://play.google.com/store" target="_blank" rel="noopener">
          Download on Google Play
        </a>
      </div>
    </div>

    <div class="preview-board" aria-hidden="true">
      <span>X</span>
      <span>O</span>
      <span>X</span>
      <span></span>
      <span>X</span>
      <span>O</span>
      <span>O</span>
      <span></span>
      <span>X</span>
    </div>
  </section>
</main>
