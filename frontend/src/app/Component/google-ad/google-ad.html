<section class="ad-shell" [attr.aria-label]="label">
  <ng-container *ngIf="googleAds.enabled; else adPlaceholder">
    <ins
      class="adsbygoogle"
      style="display: block"
      [attr.data-ad-client]="adClient"
      [attr.data-ad-slot]="adSlot"
      data-ad-format="auto"
      data-full-width-responsive="true">
    </ins>
  </ng-container>

  <ng-template #adPlaceholder>
    <div class="ad-placeholder">
      <span>{{ label }}</span>
      <strong>Google Play Ad</strong>
    </div>
  </ng-template>
</section>
